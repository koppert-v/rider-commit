name: Build Rider Plugin

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.plugin_version.outputs.version }}
      tag: ${{ steps.plugin_version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine plugin version
        id: plugin_version
        shell: pwsh
        run: |
          $versionLine = Get-Content -LiteralPath "gradle.properties" |
            Where-Object { $_ -match '^pluginVersion=' } |
            Select-Object -First 1

          $sourceVersion = ($versionLine -split '=', 2)[1].Trim()
          $version = $sourceVersion

          $releaseBranches = @("refs/heads/main", "refs/heads/master")
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -in $releaseBranches) {
            if ($sourceVersion -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
              throw "pluginVersion '$sourceVersion' must use the major.minor.patch format."
            }

            if (git tag --list "v$version") {
              throw "Tag 'v$version' already exists. Increase pluginVersion before the next release."
            }
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test and build plugin
        run: ./gradlew clean test buildPlugin -PpluginVersion=${{ steps.plugin_version.outputs.version }} --no-parallel --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: rider-commit-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: rider-commit-plugin
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" artifacts/*.zip \
            --target "$GITHUB_SHA" \
            --generate-notes \
            --title "$RELEASE_TAG"

  publish-plugin-repository:
    name: Publish Rider plugin repository
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs:
      - build
      - release
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: rider-commit-plugin
          path: artifacts

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Prepare plugin repository
        shell: pwsh
        run: |
          ./scripts/prepare-plugin-repository.ps1 `
            -ArtifactDirectory "artifacts" `
            -OutputDirectory "_site" `
            -BaseUrl "${{ steps.pages.outputs.base_url }}" `
            -Tag "${{ needs.build.outputs.tag }}" `
            -Version "${{ needs.build.outputs.version }}"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
